<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AL 3D Print – Startseite</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&family=Exo+2:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --font-main: 'Exo 2', sans-serif;
            --font-hero: 'Orbitron', sans-serif;
            --accent: #ff4d00;
        }

        body {
            margin: 0;
            background: #000;
            color: #fff;
            font-family: var(--font-main);
        }

        /* Header */
        header {
            text-align: center;
            padding: 20px 0;
        }

        header img {
            width: 140px;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.2));
            animation: rotateLogo 12s linear infinite;
        }

        @keyframes rotateLogo {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Navigation */
        nav {
            text-align: center;
            background: #111;
            padding: 10px 0;
        }

        nav a {
            color: #ddd;
            margin: 0 15px;
            text-decoration: none;
            font-weight: 600;
            transition: 0.25s ease;
        }

        nav a:hover {
            color: #fff;
            text-shadow: 0 0 8px rgba(255,255,255,0.6);
        }

        /* Startseiten-Bild */
        .hero-image {
            width: 100%;
            max-width: 900px;
            display: block;
            margin: 30px auto 10px auto;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(255,255,255,0.15);
        }

        /* Hologramm Counter (kleiner & dezenter) */
        #holo-counter {
            margin: 20px auto;
            width: 200px;
            padding: 14px;
            text-align: center;
            font-family: 'Orbitron', sans-serif;
            color: var(--accent);
            border: 1px solid rgba(255, 77, 0, 0.4);
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(6px);
            box-shadow: 
                0 0 14px rgba(255, 77, 0, 0.25),
                inset 0 0 14px rgba(255, 77, 0, 0.15);
            position: relative;
            overflow: hidden;
        }

        .holo-icon {
            font-size: 1.6rem;
            margin-bottom: 6px;
            opacity: 0.9;
            text-shadow: 0 0 10px rgba(255, 77, 0, 0.6);
        }

        .holo-label {
            font-size: 0.9rem;
            letter-spacing: 2px;
            opacity: 0.7;
            margin-bottom: 4px;
        }

        .holo-number {
            font-size: 1.8rem;
            font-weight: 700;
            text-shadow: 
                0 0 10px rgba(255, 77, 0, 0.8),
                0 0 20px rgba(255, 77, 0, 0.4);
        }

        .holo-scan {
            position: absolute;
            top: -100%;
            left: 0;
            width: 100%;
            height: 40%;
            background: linear-gradient(
                to bottom,
                rgba(255, 77, 0, 0.0),
                rgba(255, 77, 0, 0.15),
                rgba(255, 77, 0, 0.0)
            );
            animation: scan 3s linear infinite;
        }

        @keyframes scan {
            0% { top: -40%; }
            100% { top: 140%; }
        }

        /* Content */
        .content {
            text-align: center;
            padding: 40px 20px;
        }

        .content h1 {
            font-family: var(--font-hero);
            font-size: 2.4rem;
            text-shadow: 0 0 12px rgba(255,255,255,0.2);
        }
    </style>
</head>

<body>

<header>
    <img src="logo.png" alt="AL 3D Print Logo">
</header>

<nav>
    <a href="index.html">Startseite</a>
    <a href="galerie.html">Galerie</a>
    <a href="ueber-al3dprint.html">Über AL 3D Print</a>
    <a href="gaestebuch.html">Gästebuch</a> <!-- NEU -->
    <a href="kontakt.html">Kontakt</a>
    <a href="impressum-datenschutz.html">Impressum & Datenschutz</a>
</nav>

<div class="hero">
    <div class="hero-content">
        <h1>From Sketch to Solid: Your Idea in 3D</h1>
    </div>

    <img src="bilder/mannmitwolf.jpg" alt="Mann mit Wolf" class="hero-image">
</div>


<!-- HOLOGRAMM COUNTER -->
<div id="holo-counter">
    <div class="holo-icon">👁️</div>
    <div class="holo-label">Besucher</div>
    <div class="holo-number" id="visitor-counter">0</div>
    <div class="holo-scan"></div>
</div>

<div class="content">
    <h1>Willkommen bei AL 3D Print</h1>
    <p>Premium 3D‑Druck, Design und technische Präzision.</p>
</div>

<!-- JAVASCRIPT -->
<script>
async function updateVisitorCounter() {
    const url = "https://api.countapi.xyz/hit/al3dprint.de/visits";

    try {
        const response = await fetch(url);
        const data = await response.json();

        const target = data.value;
        const display = document.getElementById("visitor-counter");

        let current = 0;

        const animate = () => {
            current += Math.ceil((target - current) * 0.1);
            display.textContent = current;

            display.style.textShadow = `
                0 0 ${6 + (current % 6)}px rgba(255, 77, 0, 0.9),
                0 0 ${12 + (current % 12)}px rgba(255, 77, 0, 0.5)
            `;

            if (current < target) {
                requestAnimationFrame(animate);
            }
        };

        animate();

    } catch (err) {
        console.error("Counter Fehler:", err);
    }
}

updateVisitorCounter();
</script>

</body>
</html>
