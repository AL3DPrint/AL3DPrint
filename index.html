<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>AL 3D Print – Startseite</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            color: #333;
            text-align: center;
        }

        h1 {
            margin-top: 1.5rem;
        }

        /* Slideshow-Container */
        .slideshow {
            position: relative;
            width: 60%;
            max-width: 400px;
            margin: 2rem auto;
            border-radius: 10px;
            border: 2px solid #ccc;
            overflow: hidden;
        }

        .slideshow img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: auto;
            opacity: 0;
            animation: fadeSlide 12s infinite;
        }

        /* Reihenfolge der Bilder */
        .slideshow img:nth-child(1) { animation-delay: 0s; }
        .slideshow img:nth-child(2) { animation-delay: 4s; }
        .slideshow img:nth-child(3) { animation-delay: 8s; }

        @keyframes fadeSlide {
            0%   { opacity: 0; }
            10%  { opacity: 1; }
            30%  { opacity: 1; }
            40%  { opacity: 0; }
            100% { opacity: 0; }
        }
    </style>
</head>
<body>

<h1>AL 3D Print</h1>

<div class="slideshow">
    <img src="bilder/Ganesha.jpg" alt="">
    <img src="bilder/elephant.jpg" alt="">
    <img src="bilder/ganeshalightbox.jpg" alt="">
</div>

</body>
</html>
