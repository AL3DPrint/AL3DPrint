<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AL 3D Print – Startseite</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #000;
            color: #fff;
            height: 100vh;
            overflow: hidden; /* Kein Scrollen */
            display: flex;
            flex-direction: column;
        }

        /* Logo */
        header {
            background: #111;
            padding: 0.5rem;
            text-align: center;
            flex: 0 0 auto;
        }

        header img {
            max-width: 120px;
            height: auto;
        }

        /* Hamburger Menü */
        .hamburger {
            display: none;
            font-size: 2rem;
            color: white;
            cursor: pointer;
            padding: 0.5rem;
            background: #222;
            text-align: center;
        }

        #menu-toggle {
            display: none;
        }

        nav {
            background: #222;
            padding: 0.5rem;
            text-align: center;
            flex: 0 0 auto;
        }

        nav a {
            color: white;
            margin: 0 1rem;
            text-decoration: none;
            font-weight: bold;
            font-size: 1rem;
        }

        @media (max-width: 768px) {
            nav {
                display: none;
                flex-direction: column;
            }

            nav a {
                margin: 0.7rem 0;
                font-size: 1.2rem;
            }

            .hamburger {
                display: block;
            }

            #menu-toggle:checked + nav {
                display: flex;
            }
        }

        /* HERO-BEREICH */
        .hero {
            position: relative;
            height: 100%;
            width: 100%;
            background: radial-gradient(circle at center, rgba(255,255,255,0.05), rgba(0,0,0,0.95)),
                        linear-gradient(to bottom, rgba(0,0,0,0.8), rgba(0,0,0,1));
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            flex: 1 1 auto;
        }

        /* Spotlight */
        .hero::before {
            content: "";
            position: absolute;
            top: -20%;
            left: 50%;
            transform: translateX(-50%);
            width: 120%;
            height: 120%;
            background: radial-gradient(circle, rgba(255,255,255,0.18) 0%, rgba(0,0,0,0) 70%);
            pointer-events: none;
        }

        /* Vignette */
        .hero::after {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(circle, rgba(0,0,0,0) 40%, rgba(0,0,0,0.8) 100%);
            pointer-events: none;
        }

        /* Bild */
        .hero-image {
            max-height: 60vh;
            width: auto;
            object-fit: contain;
            z-index: 2;
            filter: drop-shadow(0 0 20px rgba(0,0,0,0.8));
        }

        /* Text + Button */
        .hero-content {
            position: absolute;
            top: 10%;
            text-align: center;
            color: white;
            z-index: 3;
        }

        .hero-content h1 {
            font-size: 2.4rem;
            margin-bottom: 1rem;
            text-shadow: 0 0 15px rgba(0,0,0,0.8);
        }

        .hero-content button {
            padding: 0.7rem 1.4rem;
            font-size: 1.1rem;
            border: none;
            border-radius: 6px;
            background: #ffffffcc;
            color: #111;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .hero-content button:hover {
            background: white;
            transform: scale(1.05);
        }

        /* Mobile Anpassungen */
        @media (max-width: 768px) {
            .hero-content h1 {
                font-size: 1.8rem;
            }

            .hero-image {
                max-height: 45vh;
            }
        }

        /* Laufband */
        .ticker {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #111;
            color: #fff;
            padding: 0.4rem 0;
            font-size: 0.9rem;
            font-weight: bold;
            overflow: hidden;
            white-space: nowrap;
            z-index: 9999;
        }

        .ticker span {
            display: inline-block;
            padding-left: 100%;
            animation: ticker 12s linear infinite;
        }

        @keyframes ticker {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }
    </style>
</head>

<body>

<header>
    <img src="logo.png" alt="AL 3D Print Logo">
</header>

<label for="menu-toggle" class="hamburger">☰ Menü</label>
<input type="checkbox" id="menu-toggle">

<nav>
    <a href="index.html">Startseite</a>
    <a href="galerie.html">Galerie</a>
    <a href="ueber-al3dprint.html">Über AL 3D Print</a>
    <a href="kontakt.html">Kontakt</a>
    <a href="impressum-datenschutz.html">Impressum & Datenschutz</a>
</nav>

<div class="hero">
    <div class="hero-content">
        <h1>Kunst, die Charakter hat.</h1>
        <button onclick="location.href='galerie.html'">Galerie entdecken</button>
    </div>

    <img src="bilder/mannmitwolf.jpg" alt="Mann mit Wolf" class="hero-image">
</div>

<div class="ticker">
    <span>🚧 Diese Website befindet sich aktuell im Aufbau – Inhalte werden laufend ergänzt 🚧</span>
</div>

</body>
</html>
