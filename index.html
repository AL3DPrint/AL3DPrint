<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AL 3D Print – Startseite</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&family=Exo+2:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        :root {
            --font-main: 'Exo 2', sans-serif;
            --font-hero: 'Orbitron', sans-serif;

            --header-height: auto; /* Header passt sich Logo an */
            --menu-height: 50px;
            --ticker-height: 32px;
        }

        body {
            margin: 0;
            font-family: var(--font-main);
            background: #000;
            color: #fff;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Logo + Rotation */
        header {
            background: #111;
            padding: 0.5rem 0;
            text-align: center;
            flex: 0 0 auto;
        }

        header img {
            max-width: 110px;
            height: auto;
            filter: drop-shadow(0 0 6px rgba(255,255,255,0.2));
            animation: rotateLogo 12s linear infinite;
        }

        @keyframes rotateLogo {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Hamburger Menü */
        .hamburger {
            display: none;
            font-size: 2rem;
            color: white;
            cursor: pointer;
            padding: 0.5rem;
            background: #222;
            text-align: center;
        }

        #menu-toggle {
            display: none;
        }

        nav {
            background: #222;
            padding: 0.5rem;
            text-align: center;
            flex: 0 0 auto;
        }

        nav a {
            font-family: var(--font-main);
            color: #ddd;
            margin: 0 1.2rem;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            letter-spacing: 0.5px;
            transition: 0.25s ease;
        }

        nav a:hover {
            color: white;
            text-shadow: 0 0 8px rgba(255,255,255,0.6);
        }

        /* MOBILE FIX: Menü komplett ausblenden */
        @media (max-width: 768px) {

            nav {
                display: none;
                flex-direction: column;
            }

            .hamburger {
                display: block;
            }

            #menu-toggle:checked + nav {
                display: flex;
            }

            nav a {
                margin: 0.7rem 0;
                font-size: 1.2rem;
            }
        }

        /* HERO-BEREICH */
        .hero {
            position: relative;
            height: calc(100vh - 120px - var(--menu-height) - var(--ticker-height));
            width: 100%;
            background: radial-gradient(circle at center, rgba(255,255,255,0.05), rgba(0,0,0,0.95)),
                        linear-gradient(to bottom, rgba(0,0,0,0.8), rgba(0,0,0,1));
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Spotlight */
        .hero::before {
            content: "";
            position: absolute;
            top: -20%;
            left: 50%;
            transform: translateX(-50%);
            width: 120%;
            height: 120%;
            background: radial-gradient(circle, rgba(255,255,255,0.18) 0%, rgba(0,0,0,0) 70%);
            pointer-events: none;
        }

        /* Vignette */
        .hero::after {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(circle, rgba(0,0,0,0) 40%, rgba(0,0,0,0.8) 100%);
            pointer-events: none;
        }

        /* Bild */
        .hero-image {
            max-height: 55vh;
            width: auto;
            object-fit: contain;
            z-index: 2;
            filter: drop-shadow(0 0 20px rgba(0,0,0,0.8));
            opacity: 0;
            animation: fadeInImage 1.6s ease-out forwards;
            animation-delay: 0.4s;
        }

        @keyframes fadeInImage {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        /* Slogan */
        .hero-content {
            position: absolute;
            top: 4%;
            width: 100%;
            text-align: center;
            color: white;
            z-index: 3;
        }

        .hero-content h1 {
            font-family: var(--font-hero);
            font-size: 2.4rem;
            margin: 0;
            padding: 0 1rem;
            text-shadow: 0 0 18px rgba(0,0,0,0.9), 0 0 8px rgba(255,255,255,0.2);
            font-weight: 600;
            letter-spacing: 1px;
            opacity: 0;
            animation: fadeUp 1.2s ease-out forwards;
        }

        @keyframes fadeUp {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* Mobile */
        @media (max-width: 768px) {
            .hero-content h1 {
                font-size: 1.8rem;
                padding: 0 0.5rem;
                line-height: 1.3;
            }

            .hero-image {
                max-height: 42vh;
            }
        }

        /* Laufband */
        .ticker {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #111;
            color: #fff;
            height: var(--ticker-height);
            line-height: var(--ticker-height);
            font-size: 0.9rem;
            font-weight: bold;
            overflow: hidden;
            white-space: nowrap;
            z-index: 9999;
        }

        .ticker span {
            display: inline-block;
            padding-left: 100%;
            animation: ticker 12s linear infinite;
        }

        @keyframes ticker {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }


        /* --------------------------------------------- */
        /* GÄSTEBUCH – CSS ERWEITERUNG */
        /* --------------------------------------------- */

        #guestbook {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
            color: #fff;
        }

        #guestbook h2 {
            font-size: 2rem;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #guestbook-entries .entry {
            border: 1px solid #333;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 6px;
            background: #111;
        }

        .entry .name {
            font-weight: bold;
            font-size: 1.1rem;
        }

        .entry .stars {
            color: #ffcc00;
            margin: 5px 0;
        }

        .entry .date {
            font-size: 0.8rem;
            opacity: 0.6;
            margin-bottom: 10px;
        }

        .entry .message {
            line-height: 1.5;
        }

        #guestbook-form {
            margin-top: 40px;
            border-top: 1px solid #333;
            padding-top: 30px;
        }

        #guestbook-form label {
            display: block;
            margin-top: 15px;
            margin-bottom: 5px;
            font-size: 0.9rem;
            opacity: 0.8;
        }

        #guestbook-form input,
        #guestbook-form textarea,
        #guestbook-form select {
            width: 100%;
            padding: 12px;
            border: 1px solid #333;
            background: #111;
            color: #fff;
            border-radius: 4px;
        }

        #guestbook-form button {
            margin-top: 20px;
            padding: 12px 20px;
            background: #ff4d00;
            border: none;
            color: #fff;
            cursor: pointer;
            border-radius: 4px;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #guestbook-form button:hover {
            background: #ff6a2a;
        }

        #gb-info {
            margin-top: 10px;
            font-size: 0.8rem;
            opacity: 0.6;
        }

    </style>
</head>

<body>

<header>
    <img src="logo.png" alt="AL 3D Print Logo">
</header>

<label for="menu-toggle" class="hamburger">☰ Menü</label>
<input type="checkbox" id="menu-toggle">

<nav>
    <a href="index.html">Startseite</a>
    <a href="galerie.html">Galerie</a>
    <a href="ueber-al3dprint.html">Über AL 3D Print</a>
    <a href="gaestebuch.html">Gästebuch</a>
    <a href="kontakt.html">Kontakt</a>
    <a href="impressum-datenschutz.html">Impressum & Datenschutz</a>
</nav>

<div class="hero">
    <div class="hero-content">
        <h1>From Sketch to Solid: Your Idea in 3D</h1>
    </div>

    <img src="bilder/mannmitwolf.jpg" alt="Mann mit Wolf" class="hero-image">
</div>


<!-- ------------------------------------------------------------ -->
<!-- GÄSTEBUCH START -->
<!-- ------------------------------------------------------------ -->

<section id="guestbook">
    <h2>Gästebuch</h2>

    <div id="guestbook-entries">
        <!-- Einträge werden automatisch per JS geladen -->
    </div>

    <form id="guestbook-form">
        <h3>Neuen Eintrag verfassen</h3>

        <label for="gb-name">Name</label>
        <input type="text" id="gb-name" required>

        <label for="gb-message">Nachricht</label>
        <textarea id="gb-message" required></textarea>

        <label for="gb-stars">Sterne</label>
        <select id="gb-stars">
            <option value="5">★★★★★</option>
            <option value="4">★★★★☆</option>
            <option value="3">★★★☆☆</option>
            <option value="2">★★☆☆☆</option>
            <option value="1">★☆☆☆☆</option>
        </select>

        <button type="button" onclick="alert('Dein Eintrag wird geprüft und manuell veröffentlicht.')">
            Absenden
        </button>

        <p id="gb-info">Dein Eintrag wird nach Prüfung veröffentlicht.</p>
    </form>
</section>

<!-- ------------------------------------------------------------ -->
<!-- GÄSTEBUCH ENDE -->
<!-- ------------------------------------------------------------ -->


<div class="ticker">
    <span>🚧 Diese Website befindet sich aktuell im Aufbau – Inhalte werden laufend ergänzt 🚧</span>
</div>

<script src="guestbook.js"></script>

</body>
</html>
