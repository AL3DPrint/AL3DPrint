<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AL 3D Print – Startseite</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            color: #333;
            height: 100vh; /* Gesamte Höhe = Bildschirmhöhe */
            display: flex;
            flex-direction: column;
        }

        /* Logo */
        header {
            background: #222;
            padding: 0.5rem;
            text-align: center;
            flex: 0 0 auto;
        }

        header img {
            max-width: 120px;
            height: auto;
        }

        /* Hamburger Menü */
        .hamburger {
            display: none;
            font-size: 2rem;
            color: white;
            cursor: pointer;
            padding: 0.5rem;
            background: #333;
            text-align: center;
        }

        #menu-toggle {
            display: none;
        }

        nav {
            background: #333;
            padding: 0.5rem;
            text-align: center;
            flex: 0 0 auto;
        }

        nav a {
            color: white;
            margin: 0 1rem;
            text-decoration: none;
            font-weight: bold;
            font-size: 1rem;
        }

        @media (max-width: 768px) {
            nav {
                display: none;
                flex-direction: column;
            }

            nav a {
                margin: 0.7rem 0;
                font-size: 1.2rem;
            }

            .hamburger {
                display: block;
            }

            #menu-toggle:checked + nav {
                display: flex;
            }
        }

        /* Hauptbereich */
        main {
            flex: 1 1 auto;
            display: flex;
            flex-direction: column;
            justify-content: center; /* Inhalt vertikal zentrieren */
            align-items: center;
            padding: 0.5rem;
            text-align: center;
            overflow: hidden; /* verhindert Scrollen */
        }

        main h1 {
            margin: 0.3rem 0;
            font-size: 1.4rem;
        }

        main p {
            margin: 0.3rem 0 1rem 0;
            font-size: 1rem;
        }

        /* Bild perfekt responsiv und nie zu groß */
        .startbild {
            max-height: 45vh; /* Bild nimmt max. 45% der Bildschirmhöhe */
            max-width: 90%;
            width: auto;
            height: auto;
            object-fit: contain;
            border-radius: 10px;
            border: 2px solid #ccc;
        }

        /* Footer */
        footer {
            background: #222;
            color: white;
            text-align: center;
            padding: 0.5rem;
            flex: 0 0 auto;
        }

        /* Laufband */
        .ticker {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #222;
            color: #fff;
            padding: 0.4rem 0;
            font-size: 0.9rem;
            font-weight: bold;
            overflow: hidden;
            white-space: nowrap;
            z-index: 9999;
        }

        .ticker span {
            display: inline-block;
            padding-left: 100%;
            animation: ticker 12s linear infinite;
        }

        @keyframes ticker {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }
    </style>
</head>

<body>

<header>
    <img src="logo.png" alt="AL 3D Print Logo">
</header>

<label for="menu-toggle" class="hamburger">☰ Menü</label>
<input type="checkbox" id="menu-toggle">

<nav>
    <a href="index.html">Startseite</a>
    <a href="galerie.html">Galerie</a>
    <a href="ueber-al3dprint.html">Über AL 3D Print</a>
    <a href="kontakt.html">Kontakt</a>
    <a href="impressum-datenschutz.html">Impressum & Datenschutz</a>
</nav>

<main>
    <h1>Willkommen bei AL 3D Print</h1>
    <p>Professionelle 3D‑Drucklösungen aus Bayern.</p>

    <img src="bilder/mannmitwolf.jpg" alt="Mann mit Wolf" class="startbild">
</main>

<footer>
    © 2026 AL 3D Print – Alle Rechte vorbehalten
</footer>

<div class="ticker">
    <span>🚧 Diese Website befindet sich aktuell im Aufbau – Inhalte werden laufend ergänzt 🚧</span>
</div>

</body>
</html>
