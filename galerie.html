<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galerie – AL 3D Print</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&family=Exo+2:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        :root {
            --font-main: 'Exo 2', sans-serif;
            --font-hero: 'Orbitron', sans-serif;

            --color-bg: #000;
            --color-panel: #111;
            --color-panel-hover: #1a1a1a;
            --color-text: #fff;
            --color-accent: #4da6ff;

            --ticker-height: 32px;
        }

        body {
            margin: 0;
            background: var(--color-bg);
            color: var(--color-text);
            font-family: var(--font-main);
            overflow-x: hidden;
        }

        /* Floating Back Button */
        .back-btn {
            position: fixed;
            top: 1rem;
            left: 1rem;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.6rem;
            color: white;
            text-decoration: none;
            z-index: 999;
            box-shadow: 0 0 12px rgba(255,255,255,0.1);
            transition: 0.25s ease;
        }

        .back-btn:hover {
            background: #222;
            box-shadow: 0 0 18px rgba(255,255,255,0.3);
            transform: scale(1.08);
        }

        /* Hero */
        .hero {
            position: relative;
            height: 28vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, rgba(255,255,255,0.05), rgba(0,0,0,0.95)),
                        linear-gradient(to bottom, rgba(0,0,0,0.8), rgba(0,0,0,1));
            overflow: hidden;
        }

        .hero::before {
            content: "";
            position: absolute;
            top: -20%;
            left: 50%;
            transform: translateX(-50%);
            width: 120%;
            height: 120%;
            background: radial-gradient(circle, rgba(255,255,255,0.18) 0%, rgba(0,0,0,0) 70%);
            pointer-events: none;
        }

        .hero h1 {
            font-family: var(--font-hero);
            font-size: 2.6rem;
            text-shadow: 0 0 18px rgba(0,0,0,0.9);
            opacity: 0;
            animation: fadeUp 1.2s ease-out forwards;
        }

        @keyframes fadeUp {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* Kategorie-Buttons */
        .categories {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1.2rem;
            padding: 2rem;
        }

        .cat-btn {
            background: var(--color-panel);
            padding: 1.4rem;
            border-radius: 10px;
            text-align: center;
            font-family: var(--font-hero);
            font-size: 1.2rem;
            letter-spacing: 1px;
            color: white;
            text-decoration: none;
            box-shadow: 0 0 12px rgba(255,255,255,0.05);
            transition: 0.25s ease;
        }

        .cat-btn:hover {
            background: var(--color-panel-hover);
            box-shadow: 0 0 18px rgba(255,255,255,0.2);
            transform: scale(1.05);
        }

        /* Bild-Grid (Platzhalter für später) */
        .gallery-grid {
            padding: 1rem 2rem 4rem 2rem;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 1.2rem;
        }

        .placeholder {
            background: #111;
            height: 200px;
            border-radius: 10px;
            box-shadow: 0 0 12px rgba(255,255,255,0.05);
        }

        /* Mobile */
        @media (max-width: 768px) {
            .hero h1 {
                font-size: 2rem;
            }
        }

    </style>
</head>

<body>

<!-- Back Button -->
<a href="index.html" class="back-btn">←</a>

<!-- Hero -->
<div class="hero">
    <h1>Galerie</h1>
</div>

<!-- Kategorie-Buttons -->
<div class="categories">
    <a class="cat-btn" href="#technisch">Technische Bauteile</a>
    <a class="cat-btn" href="#lithophane">Lithophane</a>
    <a class="cat-btn" href="#lightbox">Light Boxen</a>
    <a class="cat-btn" href="#figuren">Persönliche Figuren</a>
    <a class="cat-btn" href="#lampen">Lampen</a>
    <a class="cat-btn" href="#haushalt">Haushalt</a>
</div>

<!-- Bild-Grid (Platzhalter) -->
<div class="gallery-grid">
    <div class="placeholder"></div>
    <div class="placeholder"></div>
    <div class="placeholder"></div>
    <div class="placeholder"></div>
</div>

</body>
</html>
