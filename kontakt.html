<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontakt – AL 3D Print</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&family=Exo+2:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --font-main: 'Exo 2', sans-serif;
            --font-hero: 'Orbitron', sans-serif;

            --color-bg: #000;
            --color-panel: #111;
            --color-panel-hover: #1a1a1a;
            --color-text: #fff;
            --color-accent: #4da6ff;
            --color-whatsapp: #25D366;
        }

        body {
            margin: 0;
            background: var(--color-bg);
            color: var(--color-text);
            font-family: var(--font-main);
            overflow-x: hidden;
        }

        /* Back Button */
        .back-btn {
            position: fixed;
            top: 1rem;
            left: 1rem;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.6rem;
            color: white;
            text-decoration: none;
            z-index: 999;
            box-shadow: 0 0 12px rgba(255,255,255,0.1);
            transition: 0.25s ease;
        }

        .back-btn:hover {
            background: #222;
            box-shadow: 0 0 18px rgba(255,255,255,0.3);
            transform: scale(1.08);
        }

        /* Hero */
        .hero {
            position: relative;
            height: 28vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, rgba(255,255,255,0.05), rgba(0,0,0,0.95)),
                        linear-gradient(to bottom, rgba(0,0,0,0.8), rgba(0,0,0,1));
            overflow: hidden;
        }

        .hero::before {
            content: "";
            position: absolute;
            top: -20%;
            left: 50%;
            transform: translateX(-50%);
            width: 120%;
            height: 120%;
            background: radial-gradient(circle, rgba(255,255,255,0.18) 0%, rgba(0,0,0,0) 70%);
            pointer-events: none;
        }

        .hero h1 {
            font-family: var(--font-hero);
            font-size: 2.6rem;
            text-shadow: 0 0 18px rgba(0,0,0,0.9);
            opacity: 0;
            animation: fadeUp 1.2s ease-out forwards;
        }

        @keyframes fadeUp {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* Kontaktformular */
        .contact-container {
            max-width: 700px;
            margin: 2rem auto 2rem auto;
            background: #111;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 0 18px rgba(255,255,255,0.08);
        }

        .contact-container h2 {
            font-family: var(--font-hero);
            font-size: 1.8rem;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        label {
            display: block;
            margin-top: 1rem;
            font-size: 1rem;
            letter-spacing: 0.5px;
        }

        input, textarea {
            width: 100%;
            padding: 0.8rem;
            margin-top: 0.4rem;
            border: none;
            border-radius: 8px;
            background: #1a1a1a;
            color: white;
            font-family: var(--font-main);
            font-size: 1rem;
            box-shadow: inset 0 0 8px rgba(255,255,255,0.05);
            transition: 0.25s ease;
        }

        input:focus, textarea:focus {
            outline: none;
            background: #222;
            box-shadow: 0 0 12px rgba(255,255,255,0.15);
        }

        textarea {
            height: 150px;
            resize: none;
        }

        button {
            margin-top: 1.5rem;
            width: 100%;
            padding: 1rem;
            background: #222;
            border: none;
            border-radius: 10px;
            color: white;
            font-family: var(--font-hero);
            font-size: 1.2rem;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.25s ease;
            box-shadow: 0 0 12px rgba(255,255,255,0.08);
        }

        button:hover {
            background: #333;
            box-shadow: 0 0 18px rgba(255,255,255,0.2);
            transform: scale(1.03);
        }

        /* WhatsApp Box */
        .whatsapp-box {
            max-width: 700px;
            margin: 0 auto 4rem auto;
            background: #111;
            padding: 1.5rem 2rem;
            border-radius: 12px;
            box-shadow: 0 0 18px rgba(37,211,102,0.25);
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .whatsapp-title {
            font-family: var(--font-hero);
            font-size: 1.4rem;
        }

        .whatsapp-text {
            font-size: 0.95rem;
            color: #ddd;
        }

        .whatsapp-btn {
            margin-top: 0.5rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.8rem 1.2rem;
            border-radius: 999px;
            background: var(--color-whatsapp);
            color: #000;
            text-decoration: none;
            font-weight: 600;
            letter-spacing: 0.5px;
            box-shadow: 0 0 14px rgba(37,211,102,0.6);
            transition: 0.25s ease;
        }

        .whatsapp-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(37,211,102,0.9);
        }

        .whatsapp-icon {
            font-size: 1.3rem;
        }

        @media (max-width: 768px) {
            .hero h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>

<body>

<a href="index.html" class="back-btn">←</a>

<div class="hero">
    <h1>Kontakt</h1>
</div>

<div class="contact-container">
    <h2>Schreib mir deine Anfrage</h2>

    <form action="#" method="post">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" placeholder="Dein Name">

        <label for="email">E-Mail</label>
        <input type="email" id="email" name="email" placeholder="deine@mail.de">

        <label for="message">Nachricht</label>
        <textarea id="message" name="message" placeholder="Wie kann ich dir helfen?"></textarea>

        <button type="submit">Nachricht senden</button>
    </form>
</div>

<div class="whatsapp-box">
    <div class="whatsapp-title">Direkt über WhatsApp anfragen</div>
    <div class="whatsapp-text">
        Für schnelle Rückfragen, Ideen oder Bilder – schreib mir direkt über WhatsApp.
    </div>
    <a class="whatsapp-btn" 
       href="https://wa.me/4915123558515?text=Hallo%20AL%203D%20Print,%20ich%20habe%20eine%20Anfrage%20zu%20einem%203D-Druck." 
       target="_blank" rel="noopener">
        <span class="whatsapp-icon">💬</span>
        <span>WhatsApp Chat starten</span>
    </a>
</div>

</body>
</html>
