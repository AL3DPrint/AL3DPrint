<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontakt – AL 3D Print</title>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&family=Exo+2:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --font-main: 'Exo 2', sans-serif;
            --font-hero: 'Orbitron', sans-serif;

            --color-bg: #000;
            --color-panel: #111;
            --color-text: #fff;
            --color-accent: #4da6ff;
            --color-whatsapp: #25D366;
        }

        body {
            margin: 0;
            background: var(--color-bg);
            color: var(--color-text);
            font-family: var(--font-main);
        }

        /* Back Button */
        .back-btn {
            position: fixed;
            top: 1rem;
            left: 1rem;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.6rem;
            color: white;
            text-decoration: none;
            z-index: 999;
            box-shadow: 0 0 12px rgba(255,255,255,0.1);
            transition: 0.25s ease;
        }

        .back-btn:hover {
            background: #222;
            transform: scale(1.08);
        }

        /* Hero */
        .hero {
            height: 28vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, rgba(255,255,255,0.05), rgba(0,0,0,0.95));
        }

        .hero h1 {
            font-family: var(--font-hero);
            font-size: 2.6rem;
            opacity: 0;
            animation: fadeUp 1s ease-out forwards;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Info Box */
        .info-box {
            background: #111;
            border-left: 4px solid #4da6ff;
            padding: 1.2rem 1.5rem;
            margin: 2rem auto;
            max-width: 700px;
            border-radius: 8px;
            box-shadow: 0 0 12px rgba(255,255,255,0.08);
        }

        .info-mail,
        .info-whatsapp {
            color: #4da6ff;
            font-weight: 600;
            text-decoration: none;
        }

        /* Kontaktformular */
        .contact-container {
            max-width: 700px;
            margin: 2rem auto;
            background: #111;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 0 18px rgba(255,255,255,0.08);
        }

        .contact-container h2 {
