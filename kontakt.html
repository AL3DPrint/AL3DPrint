<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontakt – AL 3D Print</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            color: #333;
        }

        header {
            background: #222;
            padding: 1rem;
            text-align: center;
        }

        header img {
            max-width: 180px;
        }

        nav {
            background: #333;
            padding: 0.5rem;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 0 1rem;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            text-decoration: underline;
        }

        main {
            padding: 2rem;
            max-width: 700px;
            margin: auto;
        }

        h1 {
            text-align: center;
        }

        .whatsapp-box {
            background: #25D366;
            color: white;
            padding: 1rem;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 2rem;
            font-size: 1.2rem;
        }

        .whatsapp-box a {
            color: white;
            font-weight: bold;
            text-decoration: none;
        }

        form {
            background: white;
            padding: 1.5rem;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        label {
            font-weight: bold;
        }

        input, textarea {
            width: 100%;
            padding: 0.7rem;
            margin-top: 0.3rem;
            margin-bottom: 1rem;
            border-radius: 6px;
            border: 1px solid #aaa;
        }

        input[type="file"] {
            padding: 0.3rem;
        }

        button {
            background: #333;
            color: white;
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
        }

        button:hover {
            background: #555;
        }

        footer {
            background: #222;
            color: white;
            text-align: center;
            padding: 1rem;
            margin-top: 2rem;
        }
    </style>
</head>

<body>

<header>
    <img src="logo.png" alt="AL 3D Print Logo">
</header>

<nav>
    <a href="index.html">Startseite</a>
    <a href="galerie.html">Galerie</a>
    <a href="ueber-al3dprint.html">Über AL 3D Print</a>
    <a href="kontakt.html">Kontakt</a>
    <a href="impressum-datenschutz.html">Impressum & Datenschutz</a>
</nav>

<main>
    <h1>Kontakt</h1>

    <!-- WhatsApp Kontakt -->
    <div class="whatsapp-box">
        📱 <strong>Schnellkontakt per WhatsApp</strong><br><br>
        <a href="https://wa.me/4915123456789?text=Hallo%20AL%203D%20Print,%20ich%20habe%20eine%20Frage%20zu%20einem%203D-Druckauftrag."
           target="_blank">
            👉 WhatsApp öffnen
        </a>
    </div>

    <!-- Kontaktformular -->
    <form action="https://formspree.io/f/mdawdory" method="POST" enctype="multipart/form-data">
        <label>Vorname</label>
        <input type="text" name="vorname" required>

        <label>Nachname</label>
        <input type="text" name="nachname" required>

        <label>E-Mail</label>
        <input type="email" name="email" required>

        <label>WhatsApp Nummer (optional)</label>
        <input type="text" name="whatsapp">

        <label>Ihre Nachricht</label>
        <textarea name="nachricht" rows="5" required></textarea>

        <label>Dateien anhängen (Fotos, Skizzen, STL, 3MF …)</label>
        <input type="file" name="dateien" multiple>

        <button type="submit">Nachricht senden</button>
    </form>
</main>

<footer>
    © 2026 AL 3D Print – Alle Rechte vorbehalten
</footer>

</body>
</html>
