<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gästebuch – AL 3D Print</title>

    <style>
        body {
            background-color: #0f0f0f;
            color: #ffffff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }

        h1 {
            margin-top: 10px;
            margin-bottom: 20px;
        }

        /* Zurück-Button wie bei kontakt.html */
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #ff7a00;
            text-decoration: none;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 25px;
            transition: color 0.2s ease;
        }

        .back-link:hover {
            color: #ffa64d;
        }

        .back-link .arrow {
            font-size: 20px;
            line-height: 1;
        }

        /* Formular */
        label {
            display: block;
            margin-top: 15px;
            margin-bottom: 5px;
            font-size: 16px;
        }

        input, textarea, select {
            width: 100%;
            padding: 10px;
            background: #1b1b1b;
            border: 1px solid #333;
            color: #fff;
            font-size: 16px;
            border-radius: 4px;
        }

        textarea {
            height: 120px;
            resize: none;
        }

        button {
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            background-color: #ff7a00;
            border: none;
            color: #fff;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            transition: background 0.2s ease;
        }

        button:hover {
            background-color: #ffa64d;
        }

        /* Animierte Bestätigung */
        .success-message {
            margin-top: 20px;
            padding: 15px 20px;
            background: #1b1b1b;
            border-left: 4px solid #ff7a00;
            color: #ffffff;
            font-size: 16px;
            opacity: 0;
            transform: translateY(10px);
            animation: fadeSlideIn 0.5s forwards;
        }

        @keyframes fadeSlideIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <a href="/" class="back-link">
        <span class="arrow">←</span> Zurück
    </a>

    <h1>Gästebuch</h1>

    <h2>Neuen Eintrag verfassen</h2>

    <form id="guestbookForm">
        <label for="name">Name</label>
        <input type="text" id="name" required>

        <label for="message">Nachricht</label>
        <textarea id="message" required></textarea>

        <label for="stars">Sterne</label>
        <select id="stars">
            <option>★★★★★</option>
            <option>★★★★☆</option>
            <option>★★★☆☆</option>
            <option>★★☆☆☆</option>
            <option>★☆☆☆☆</option>
        </select>

        <button type="submit">ABSENDEN</button>
    </form>

    <div id="success-message" style="display:none;" class="success-message">
        Danke! Dein Eintrag wurde erfolgreich gesendet.
    </div>

    <script>
        document.getElementById("guestbookForm").addEventListener("submit", async function(e) {
            e.preventDefault();

            const name = document.getElementById("name").value;
            const message = document.getElementById("message").value;
            const stars = document.getElementById("stars").value;

            // GitHub Issue API
            const issueData = {
                title: `Gästebucheintrag von ${name}`,
                body: `**Name:** ${name}\n**Sterne:** ${stars}\n\n**Nachricht:**\n${message}`
            };

            await fetch("https://api.github.com/repos/DEINUSER/DEINREPO/issues", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "token DEINTOKEN"
                },
                body: JSON.stringify(issueData)
            });

            // Bestätigung anzeigen
            const box = document.getElementById("success-message");
            box.style.display = "block";

            // Nach oben scrollen
            window.scrollTo({ top: 0, behavior: "smooth" });

            // Formular leeren
            document.getElementById("guestbookForm").reset();
        });
    </script>

</body>
</html>
