<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gästebuch – AL 3D Print</title>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&family=Exo+2:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css"> <!-- deine bestehende CSS -->
</head>

<body>

<header>
    <img src="logo.png" alt="AL 3D Print Logo">
</header>

<label for="menu-toggle" class="hamburger">☰ Menü</label>
<input type="checkbox" id="menu-toggle">

<nav>
    <a href="index.html">Startseite</a>
    <a href="galerie.html">Galerie</a>
    <a href="ueber-al3dprint.html">Über AL 3D Print</a>
    <a href="gaestebuch.html">Gästebuch</a>
    <a href="kontakt.html">Kontakt</a>
    <a href="impressum-datenschutz.html">Impressum & Datenschutz</a>
</nav>

<section id="guestbook">
    <h2>Gästebuch</h2>

    <div id="guestbook-entries">
        <!-- Einträge werden automatisch geladen -->
    </div>

    <form id="guestbook-form">
        <h3>Neuen Eintrag verfassen</h3>

        <label for="gb-name">Name</label>
        <input type="text" id="gb-name" required>

        <label for="gb-message">Nachricht</label>
        <textarea id="gb-message" required></textarea>

        <label for="gb-stars">Sterne</label>
        <select id="gb-stars">
            <option value="5">★★★★★</option>
            <option value="4">★★★★☆</option>
            <option value="3">★★★☆☆</option>
            <option value="2">★★☆☆☆</option>
            <option value="1">★☆☆☆☆</option>
        </select>

        <button type="button" onclick="alert('Dein Eintrag wird geprüft und manuell veröffentlicht.')">
            Absenden
        </button>

        <p id="gb-info">Dein Eintrag wird nach Prüfung veröffentlicht.</p>
    </form>
</section>

<script src="guestbook.js"></script>

</body>
</html>
