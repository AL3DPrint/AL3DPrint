<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kundenmeinungen – AL 3D Print</title>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&family=Exo+2:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            background: #000;
            color: #fff;
            font-family: 'Exo 2', sans-serif;
        }

        header {
            background: #111;
            padding: 0.5rem 0;
            text-align: center;
        }

        header img {
            max-width: 110px;
            animation: rotateLogo 12s linear infinite;
        }

        @keyframes rotateLogo {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .back {
            display: inline-block;
            margin: 20px;
            color: #ff4d00;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
        }

        .page-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            text-align: center;
            margin-bottom: 40px;
        }

        .entry {
            background: #111;
            border: 1px solid #333;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 6px;
        }

        .stars {
            color: #ffcc00;
        }
    </style>
</head>

<body>

<header>
    <img src="logo.png" alt="AL 3D Print Logo">
</header>

<a class="back" href="gaestebuch.html">← Zurück</a>

<div class="page-container">
    <h1>Kundenmeinungen</h1>
    <div id="guestbook-entries"></div>
</div>

<script src="guestbook.js"></script>

</body>
